version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - musicnet
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: top-songs-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - musicnet
    environment:
      MONGO_URL: mongodb://mongo:27017/musicdb

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ""
      ME_CONFIG_MONGODB_ADMINPASSWORD: ""
    networks:
      - musicnet

networks:
  musicnet:

volumes:
  mongo-data: {}
